<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Selamat Ulang Tahun, Norin! 🎉</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,600&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#FFF6E9; --pink:#FF4D8D; --yellow:#FFC93C;
  --teal:#19C3B0; --purple:#7B3FE4; --orange:#FF7A3D;
  --ink:#2B1338; --white:#FFFFFF;
  --shadow:0 24px 60px -10px rgba(43,19,56,.28);
  --stroke:4px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:'Poppins',sans-serif; background:var(--cream); color:var(--ink);
  overflow:hidden; height:100vh; width:100vw; -webkit-tap-highlight-color:transparent;
}
@media(prefers-reduced-motion:reduce){*{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important;}}
button{font-family:'Poppins',sans-serif;cursor:pointer;border:none;background:none;}
button:focus-visible,input:focus-visible{outline:3px solid var(--purple);outline-offset:3px;}
input{font-family:'Poppins',sans-serif;}

/* ── BG ── */
.bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.bg-blob{position:absolute;border-radius:50%;filter:blur(70px);opacity:.32;pointer-events:none;animation:blobDrift 16s ease-in-out infinite alternate;}
@keyframes blobDrift{0%{transform:translate(0,0) scale(1);}100%{transform:translate(28px,18px) scale(1.1);}}
.star{position:absolute;opacity:0;animation:starFloat linear infinite;}
@keyframes starFloat{0%{opacity:0;transform:translateY(0) rotate(0deg) scale(.5);}12%{opacity:.9;}88%{opacity:.9;}100%{opacity:0;transform:translateY(-115vh) rotate(400deg) scale(1.3);}}
.shimmer-line{position:absolute;height:1px;width:100px;opacity:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.55),transparent);animation:shimMove 5s ease-in-out infinite;}
@keyframes shimMove{0%{opacity:0;transform:translateX(-30px);}35%{opacity:.8;}65%{opacity:.8;}100%{opacity:0;transform:translateX(60px);}}

/* ── APP ── */
#app{position:relative;width:100vw;height:100vh;overflow:hidden;z-index:1;}
canvas#confetti-canvas{position:fixed;inset:0;width:100vw;height:100vh;z-index:999;pointer-events:none;}

.scene{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  opacity:0;visibility:hidden;pointer-events:none;padding:20px;z-index:1;will-change:opacity,transform;
}
.scene[data-anim="pop"]   {transform:scale(.8) rotate(-4deg); transition:opacity .65s ease,transform .65s cubic-bezier(.22,1,.36,1);}
.scene[data-anim="rise"]  {transform:translateY(64px);        transition:opacity .6s ease,transform .6s cubic-bezier(.22,1,.36,1);}
.scene[data-anim="slide"] {transform:translateX(72px);        transition:opacity .6s ease,transform .6s cubic-bezier(.22,1,.36,1);}
.scene[data-anim="zoomin"]{transform:scale(1.22);             transition:opacity .65s ease,transform .65s cubic-bezier(.22,1,.36,1);}
.scene[data-anim="spin"]  {transform:scale(.72) rotate(9deg); transition:opacity .65s ease,transform .65s cubic-bezier(.22,1,.36,1);}
.scene.active{opacity:1;visibility:visible;pointer-events:auto;z-index:5;transform:none!important;}
.scene.leaving{opacity:0;visibility:hidden;pointer-events:none;z-index:2;transition:opacity .3s ease;}

/* ── CARD ── */
.card{
  position:relative;background:rgba(255,255,255,.97);
  border:var(--stroke) solid var(--ink);border-radius:36px;
  box-shadow:var(--shadow),0 0 0 8px rgba(255,77,141,.07);
  max-width:540px;width:100%;padding:40px 36px 36px;text-align:center;z-index:2;
  backdrop-filter:blur(14px);
}
.card::before,.card::after{content:'';position:absolute;width:48px;height:48px;border-radius:50%;opacity:.1;pointer-events:none;}
.card::before{background:var(--yellow);top:-14px;left:-14px;}
.card::after{background:var(--teal);bottom:-14px;right:-14px;}
.eyebrow{
  display:inline-flex;align-items:center;gap:6px;
  font-weight:700;font-size:12px;letter-spacing:.16em;text-transform:uppercase;
  color:var(--purple);background:linear-gradient(120deg,#F1E7FF,#FFE3EC);
  padding:6px 18px;border-radius:999px;border:2px solid rgba(123,63,228,.18);margin-bottom:16px;
}
h1,h2,h3{margin:0 0 8px;font-weight:800;line-height:1.1;}
p{margin:0 0 6px;font-weight:400;line-height:1.55;color:#4a3558;}

/* ── TYPEWRITER ── */
.typewriter{display:inline-block;}
.typewriter .tw-cursor{
  display:inline-block;width:2px;height:1em;background:var(--pink);
  margin-left:2px;vertical-align:text-bottom;
  animation:cursorBlink .7s step-end infinite;
}
@keyframes cursorBlink{0%,100%{opacity:1;}50%{opacity:0;}}

/* ── BUTTONS ── */
.btn{
  display:inline-flex;align-items:center;gap:8px;
  font-weight:700;font-size:15px;padding:13px 28px;border-radius:999px;
  border:var(--stroke) solid var(--ink);background:var(--yellow);color:var(--ink);
  box-shadow:0 6px 0 var(--ink);
  transition:transform .15s,box-shadow .15s,filter .15s;position:relative;overflow:hidden;
}
.btn:hover{transform:translateY(-3px);}
.btn:active{transform:translateY(3px);box-shadow:0 2px 0 var(--ink);}
.btn.pink{background:var(--pink);color:var(--white);}
.btn.teal{background:var(--teal);color:var(--white);}
.btn.purple{background:var(--purple);color:var(--white);}
.next-wrap{margin-top:24px;min-height:52px;display:flex;justify-content:center;}
.next-wrap .btn{opacity:0;pointer-events:none;transform:scale(.88);transition:opacity .5s cubic-bezier(.22,1,.36,1),transform .5s cubic-bezier(.22,1,.36,1);}
.next-wrap .btn.show{opacity:1;transform:scale(1);pointer-events:auto;}

/* ── DOT NAV ── */
#dotnav{
  position:fixed;left:50%;bottom:16px;transform:translateX(-50%);
  display:flex;gap:10px;z-index:60;
  background:rgba(255,255,255,.75);backdrop-filter:blur(8px);
  padding:8px 14px;border-radius:999px;border:2.5px solid var(--ink);
  box-shadow:0 4px 14px rgba(43,19,56,.14);
}
#dotnav button{width:10px;height:10px;border-radius:50%;background:#d8cfe0;border:2px solid var(--ink);padding:0;transition:background .3s,transform .2s;}
#dotnav button.on{background:var(--pink);transform:scale(1.35);}
#dotnav button.locked{opacity:.3;pointer-events:none;}

#mute-btn{
  position:fixed;top:16px;right:16px;z-index:60;width:44px;height:44px;border-radius:50%;
  background:var(--white);border:3px solid var(--ink);font-size:18px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 0 var(--ink);transition:transform .2s;
}
#mute-btn:hover{transform:scale(1.1);}

/* ── SCENE 0: GIFT ── */
.gift-wrap{
  cursor:pointer;position:relative;width:210px;height:190px;margin:0 auto 12px;
  filter:drop-shadow(0 8px 20px rgba(255,77,141,.22));
  transition:filter .3s,transform .2s;
}
.gift-wrap:hover{filter:drop-shadow(0 14px 28px rgba(255,77,141,.38));transform:translateY(-4px);}
.gift-lid{
  position:absolute;top:0;left:-8px;width:226px;height:52px;
  background:linear-gradient(135deg,var(--pink),#ff85b3);
  border:4px solid var(--ink);border-radius:14px;
  transform-origin:bottom left;transition:transform .7s cubic-bezier(.34,1.56,.64,1);z-index:3;
}
.gift-box{
  position:absolute;bottom:0;left:8px;width:194px;height:132px;
  background:linear-gradient(160deg,var(--purple),#5a2ab8);
  border:4px solid var(--ink);border-radius:0 0 16px 16px;overflow:hidden;
}
.gift-ribbon-v{position:absolute;left:50%;top:0;bottom:0;width:22px;margin-left:-11px;background:linear-gradient(180deg,var(--yellow),#e6b030);border-left:4px solid var(--ink);border-right:4px solid var(--ink);z-index:2;}
.gift-shine-sweep{position:absolute;inset:0;z-index:3;pointer-events:none;}
.gift-shine-sweep::after{content:'';position:absolute;top:-100%;left:-60%;width:35%;height:300%;background:linear-gradient(110deg,transparent 30%,rgba(255,255,255,.28) 50%,transparent 70%);animation:shineSweep 3.2s ease-in-out infinite;}
@keyframes shineSweep{0%,100%{left:-60%;}50%{left:120%;}}
.gift-bow{position:absolute;top:-30px;left:50%;transform:translateX(-50%);font-size:36px;z-index:4;animation:bowBob 2.2s ease-in-out infinite;}
@keyframes bowBob{0%,100%{transform:translateX(-50%) rotate(-5deg) scale(1);}50%{transform:translateX(-50%) rotate(5deg) scale(1.08);}}
.gift-wrap.opened .gift-lid{transform:translateY(-82px) rotate(-56deg);}
.tap-hint{font-size:13px;font-weight:700;color:var(--purple);margin-top:14px;animation:pulse 1.6s infinite;display:flex;align-items:center;justify-content:center;gap:6px;}
@keyframes pulse{0%,100%{opacity:.4;}50%{opacity:1;}}

/* ── SCENE 1: HERO ── */
.hero-balloon{position:absolute;width:52px;height:68px;border-radius:50% 50% 50% 50%/55% 55% 45% 45%;border:4px solid var(--ink);animation:float 5s ease-in-out infinite;filter:drop-shadow(0 5px 10px rgba(0,0,0,.14));}
.hero-balloon::after{content:'';position:absolute;bottom:-24px;left:50%;width:2px;height:26px;background:var(--ink);transform:translateX(-50%);}
@keyframes float{0%,100%{transform:translateY(0) rotate(-3deg);}50%{transform:translateY(-24px) rotate(4deg);}}
.hero-name{
    font-size: 110px; /* diperbesar */
    font-weight: 900;
    color: #ff4d8d;   /* warna tetap */
    letter-spacing: -2px;
    animation: none;
}
@keyframes shine{0%{background-position:0% 50%;}100%{background-position:300% 50%;}}
/* wave text for subtitle */
.wave-text span{display:inline-block;animation:waveLetter .8s ease-in-out infinite alternate;}
@keyframes waveLetter{from{transform:translateY(0);}to{transform:translateY(-6px);}}

/* ── SCENE 2: WISHES ── */
.wish-stage{position:relative;width:100%;height:200px;perspective:1400px;margin-bottom:12px;}
.wish-card{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;text-align:center;
  padding:22px;border-radius:24px;border:4px solid var(--ink);
  font-size:16px;font-weight:600;line-height:1.6;
  backface-visibility:hidden;transition:transform .55s cubic-bezier(.45,.05,.55,.95),opacity .55s;
  opacity:0;pointer-events:none;
}
.wish-card:nth-child(1){background:linear-gradient(135deg,#FFF1D6,#FFE4F0);}
.wish-card:nth-child(2){background:linear-gradient(135deg,#E9F9F6,#D6F0FF);}
.wish-card:nth-child(3){background:linear-gradient(135deg,#F1E7FF,#FFE4F0);}
.wish-card:nth-child(4){background:linear-gradient(135deg,#FFFBE6,#E9F9F6);}
.wish-card.active{opacity:1;z-index:2;pointer-events:auto;}
.wish-card.leave-l{transform:rotateY(-100deg);opacity:0;}
.wish-card.leave-r{transform:rotateY(100deg);opacity:0;}
.wish-quote{font-size:26px;position:absolute;top:8px;left:12px;opacity:.15;line-height:1;}
.wish-controls{display:flex;align-items:center;justify-content:center;gap:20px;margin-top:4px;}
.wish-dots{display:flex;gap:7px;}
.wish-dots span{width:9px;height:9px;border-radius:50%;background:#e3d6c4;border:2px solid var(--ink);transition:background .3s,transform .3s;}
.wish-dots span.on{background:var(--teal);transform:scale(1.4);}
.arrow-btn{width:44px;height:44px;border-radius:50%;border:3px solid var(--ink);background:var(--white);font-size:20px;box-shadow:0 4px 0 var(--ink);transition:transform .15s,box-shadow .15s;}
.arrow-btn:hover{transform:translateY(-2px);}
.arrow-btn:active{transform:translateY(2px);box-shadow:0 1px 0 var(--ink);}

/* ── SCENE 3: CAKE ── */
.cake-zone{position:relative;width:280px;height:230px;margin:0 auto 8px;}
.candle{
  position:absolute;bottom:138px;width:13px;height:40px;
  border:3px solid var(--ink);border-radius:5px;cursor:pointer;
  transition:filter .3s;z-index:10;
}
.candle:hover:not(.out){filter:brightness(1.2);}
.candle[data-candle="1"]{left:74px; background:linear-gradient(180deg,#FF85B3,var(--pink));}
.candle[data-candle="2"]{left:132px;bottom:154px; background:linear-gradient(180deg,#9ef7ec,var(--teal));}
.candle[data-candle="3"]{left:190px; background:linear-gradient(180deg,#c4a4ff,var(--purple));}
.flame{
  position:absolute;top:-26px;left:50%;transform:translateX(-50%);
  width:16px;height:24px;
  background:radial-gradient(ellipse at 50% 70%,#fff 0%,var(--yellow) 40%,var(--orange) 75%,transparent 100%);
  border-radius:50% 50% 50% 50%/60% 60% 40% 40%;
  box-shadow:0 0 12px 5px rgba(255,190,50,.55);
  animation:flicker 1s ease-in-out infinite alternate;
  transition:opacity .3s,transform .3s;
  transform-origin:50% 100%;
}
@keyframes flicker{
  0%{transform:translateX(-50%) scaleX(1) scaleY(1) rotate(-3deg);}
  100%{transform:translateX(-50%) scaleX(1.15) scaleY(1.2) rotate(4deg);}
}
/* KEY FIX: animation:none stops keyframes overriding the hidden state */
.candle.out .flame{
  animation:none;
  opacity:0 !important;
  transform:translateX(-50%) scale(0) !important;
  pointer-events:none;
}
.smoke{position:absolute;top:-28px;left:50%;width:6px;height:6px;border-radius:50%;background:rgba(190,180,210,.7);opacity:0;}
.candle.out .smoke{animation:smokeUp 1.8s ease-out forwards;}
@keyframes smokeUp{0%{opacity:.9;transform:translate(-50%,0) scale(1);}100%{opacity:0;transform:translate(-50%,-48px) scale(4);}}
.cake-tier{position:absolute;left:50%;transform:translateX(-50%);border:4px solid var(--ink);border-radius:18px;}
.tier3{bottom:0;width:260px;height:72px;background:linear-gradient(180deg,#ff80ad,var(--pink));}
.tier2{bottom:62px;width:200px;height:62px;background:linear-gradient(180deg,#4de6d5,var(--teal));}
.tier1{bottom:112px;width:140px;height:48px;background:linear-gradient(180deg,#9b6aff,var(--purple));}
.drip{position:absolute;bottom:-10px;width:18px;height:22px;border:3px solid var(--ink);border-radius:0 0 50% 50%;background:var(--yellow);}
.plate{position:absolute;bottom:-12px;left:50%;transform:translateX(-50%);width:288px;height:18px;background:linear-gradient(180deg,#f0e0c8,#dcc9a8);border:4px solid var(--ink);border-radius:999px;}

/* BLOW BUTTON — replaces unreliable mic */
.blow-zone{display:flex;flex-direction:column;align-items:center;gap:8px;margin-top:10px;}
.blow-btn{
  position:relative;overflow:hidden;
  font-size:18px;padding:14px 36px;
  background:linear-gradient(135deg,var(--teal),var(--purple));color:var(--white);
  border:var(--stroke) solid var(--ink);border-radius:999px;
  box-shadow:0 6px 0 var(--ink);
  transition:transform .1s,box-shadow .1s;
  cursor:pointer;font-family:'Poppins',sans-serif;font-weight:700;
  user-select:none;-webkit-user-select:none;
}
.blow-btn:active,.blow-btn.blowing{transform:translateY(3px);box-shadow:0 2px 0 var(--ink);}
.blow-btn .blow-ripple{
  position:absolute;border-radius:50%;background:rgba(255,255,255,.35);
  width:10px;height:10px;transform:scale(0);pointer-events:none;
  animation:blowRipple .6s ease-out forwards;
}
@keyframes blowRipple{to{transform:scale(22);opacity:0;}}
/* wind particles */
.wind-particle{
  position:fixed;pointer-events:none;z-index:200;
  font-size:22px;opacity:0;
  animation:windFly .7s ease-out forwards;
}
@keyframes windFly{
  0%{opacity:1;transform:translateX(0) translateY(0) scale(.6);}
  100%{opacity:0;transform:translateX(160px) translateY(-30px) scale(1.4);}
}
.blow-hint{font-size:13px;font-weight:600;color:#5b3f6b;min-height:20px;}
.mic-bar-wrap{width:200px;height:10px;background:#eee2cf;border:2px solid var(--ink);border-radius:8px;margin:0 auto;overflow:hidden;}
.mic-bar{height:100%;width:0%;background:linear-gradient(90deg,var(--teal),var(--purple));transition:width .06s;}

/* ── SCENE 4: VINYL ── */
.player-wrap{display:flex;flex-direction:column;align-items:center;gap:14px;}
.turntable{position:relative;width:220px;height:220px;}
.turntable-base{position:absolute;inset:-12px;background:linear-gradient(135deg,#2a2a38,#1a1a26);border:4px solid var(--ink);border-radius:24px;box-shadow:inset 0 0 20px rgba(0,0,0,.5),0 8px 20px rgba(0,0,0,.28);}
.vinyl{
  position:relative;z-index:1;width:220px;height:220px;border-radius:50%;
  background:repeating-conic-gradient(#1b1b22 0deg 10deg,#2c2c34 10deg 20deg);
  border:4px solid var(--ink);display:flex;align-items:center;justify-content:center;
  animation:spinvinyl 3.4s linear infinite;animation-play-state:paused;
}
.vinyl.playing{animation-play-state:running;}
.vinyl-label{width:80px;height:80px;border-radius:50%;background:rgb(109, 109, 109);border:4px solid var(--ink);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:var(--white);text-align:center;padding:6px;}
@keyframes spinvinyl{to{transform:rotate(360deg);}}
.tonearm{position:absolute;top:-8px;right:-22px;width:14px;height:122px;background:linear-gradient(180deg,#999,#555);border:3px solid var(--ink);border-radius:8px;transform-origin:top center;transform:rotate(-34deg);transition:transform .7s cubic-bezier(.45,.05,.55,.95);z-index:3;}
.tonearm::before{content:'';position:absolute;top:-10px;left:50%;transform:translateX(-50%);width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,#bbb,#666);border:3px solid var(--ink);}
.tonearm::after{content:'';position:absolute;bottom:-8px;left:-9px;width:32px;height:18px;border-radius:8px;background:#555;border:3px solid var(--ink);}
.tonearm.down{transform:rotate(-4deg);}
.eq{display:flex;align-items:flex-end;gap:5px;height:30px;}
.eq span{width:6px;background:linear-gradient(to top,var(--teal),var(--purple));border-radius:3px;height:6px;animation:eqbar 1s ease-in-out infinite;}
.eq span:nth-child(2){animation-delay:.15s;}.eq span:nth-child(3){animation-delay:.3s;}.eq span:nth-child(4){animation-delay:.45s;}
@keyframes eqbar{0%,100%{height:6px;}50%{height:28px;}}
.eq.paused span{animation-play-state:paused;height:5px;}
.file-row{font-size:13px;color:#5b3f6b;text-align:center;}
.file-row label{display:inline-flex;align-items:center;gap:5px;font-weight:700;cursor:pointer;color:var(--purple);border-bottom:2px dashed var(--purple);padding-bottom:1px;}

/* ── SCENE 5: WISH ── */
.wishinput-row{display:flex;gap:8px;margin-top:14px;}
.wishinput-row input{flex:1;padding:13px 16px;border-radius:999px;border:3px solid var(--ink);font-size:14px;background:rgba(255,246,233,.8);transition:box-shadow .2s;}
.wishinput-row input:focus{box-shadow:0 0 0 4px rgba(123,63,228,.18);outline:none;}
.balloon-sky{position:fixed;inset:0;pointer-events:none;z-index:50;overflow:hidden;}
.balloon-float{
  position:absolute;bottom:-90px;padding:10px 16px;border-radius:20px 20px 20px 6px;
  border:3px solid var(--ink);font-size:13px;font-weight:600;max-width:196px;line-height:1.45;
  box-shadow:0 4px 14px rgba(0,0,0,.1);
  animation:balloonUp 6.5s ease-in forwards;
}
@keyframes balloonUp{0%{opacity:0;transform:translateY(20px) rotate(-4deg);}10%{opacity:1;}85%{opacity:1;}100%{opacity:0;transform:translateY(-118vh) translateX(16px) rotate(7deg);}}

/* ── SCENE 6: FINALE ── */
.finale-emoji{font-size:clamp(40px,9vw,66px);margin-bottom:8px;animation:popBounce .7s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes popBounce{from{transform:scale(0) rotate(-12deg);}to{transform:scale(1) rotate(0);}}
.finale-title{
  font-size:clamp(28px,6.5vw,52px);font-weight:900;line-height:1.1;
  background:linear-gradient(90deg,var(--pink),var(--orange),var(--purple));
  -webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:16px;
}
.replay-row{display:flex;gap:12px;justify-content:center;margin-top:20px;flex-wrap:wrap;}

/* ── RESPONSIVE ── */
@media(max-width:520px){
  .card{padding:26px 16px 24px;border-radius:26px;}
  .cake-zone{transform:scale(.82);transform-origin:top center;}
  .turntable,.vinyl{width:184px;height:184px;}
}

/* ── SCROLL TEXT ANIMATION (für animated text lines) ── */
.anim-line{opacity:0;transform:translateY(12px);transition:opacity .5s ease,transform .5s ease;}
.anim-line.visible{opacity:1;transform:translateY(0);}
</style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>
<div class="balloon-sky" id="balloonSky"></div>
<button id="mute-btn" aria-label="Bisukan suara">🔊</button>

<div class="bg-canvas" id="bgCanvas">
  <div class="bg-blob" style="width:320px;height:320px;background:#FF4D8D;top:-90px;left:-90px;animation-duration:16s;"></div>
  <div class="bg-blob" style="width:260px;height:260px;background:#19C3B0;bottom:-70px;right:-70px;animation-duration:19s;animation-delay:2s;"></div>
  <div class="bg-blob" style="width:200px;height:200px;background:#FFC93C;top:38%;right:4%;animation-duration:13s;animation-delay:4s;"></div>

<script>
/* ═══════════════════════════════════════════════
   TYPEWRITER ENGINE
═══════════════════════════════════════════════ */
const twConfigs = {
  tw0:{ text:'Untukmu, hari ini.', speed:55 },
  tw2:{ text:'Sepatah dua patah kata', speed:50 },
  tw3:{ text:'Buat satu permintaan…', speed:50 },
  tw4:{ text:'Putar musiknya ', speed:55 },
  tw5:{ text:'Lepas harapanmu ke langit', speed:48 },
  tw6:{ text:'Selamat Ulang Tahun Sayaang!', speed:60 },
};
const twTimers = {};

function typewrite(elId, onDone){
  const el = document.getElementById(elId);
  if(!el) return;
  const cfg = twConfigs[elId];
  el.innerHTML = '';
  const span = document.createElement('span');
  const cursor = document.createElement('span');
  cursor.className = 'tw-cursor';
  el.appendChild(span); el.appendChild(cursor);
  let i = 0;
  clearInterval(twTimers[elId]);
  twTimers[elId] = setInterval(()=>{
    if(i < cfg.text.length){
      span.textContent += cfg.text[i++];
    } else {
      clearInterval(twTimers[elId]);
      // blink cursor for 1.5s then remove
      setTimeout(()=>{ cursor.remove(); if(onDone) onDone(); }, 1500);
    }
  }, cfg.speed);
}

/* wave text helper */
function makeWaveText(el, text){
  el.innerHTML = '';
  [...text].forEach((ch, i)=>{
    const s = document.createElement('span');
    s.textContent = ch === ' ' ? '\u00a0' : ch;
    s.style.animationDelay = (i * 0.06) + 's';
    el.appendChild(s);
  });
}

/* stagger anim-line children in a card */
function animLines(sceneId){
  document.querySelectorAll('#'+sceneId+' .anim-line').forEach((el,i)=>{
    el.classList.remove('visible');
    setTimeout(()=>el.classList.add('visible'), 200 + i*150);
  });
}

/* ═══════════════════════════════════════════════
   NAVIGATION
═══════════════════════════════════════════════ */
const scenes = ['scene0','scene4','scene1','scene2','scene3','scene5','scene6'];
let current = 0, unlocked = 0;

const dotnav = document.getElementById('dotnav');
scenes.forEach((_,i)=>{
  const b = document.createElement('button');
  b.setAttribute('aria-label','Scene '+(i+1));
  b.addEventListener('click', ()=>{ if(i<=unlocked) goTo(i); });
  dotnav.appendChild(b);
});

function renderDots(){
  [...dotnav.children].forEach((b,i)=>{
    b.classList.toggle('on', i===current);
    b.classList.toggle('locked', i>unlocked);
  });
}

function goTo(i){
  if(i===current) return;
  const fromEl = document.getElementById(scenes[current]);
  const toEl   = document.getElementById(scenes[i]);
  fromEl.classList.remove('active');
  fromEl.classList.add('leaving');
  setTimeout(()=>fromEl.classList.remove('leaving'), 350);
  current = i;
  if(i > unlocked) unlocked = i;
  // double-rAF so initial transform is painted before .active
  toEl.style.visibility = 'visible'; toEl.style.opacity = '0';
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    toEl.classList.add('active');
    toEl.style.visibility = ''; toEl.style.opacity = '';
  }));
  renderDots();
  onEnterScene(i);
}

function unlockNext(){
  if(current < scenes.length-1){ const n=current+1; if(n>unlocked){unlocked=n;} renderDots(); }
  const wrap = document.querySelector('#'+scenes[current]+' .next-wrap .btn');
  if(wrap) wrap.classList.add('show');
}

document.querySelectorAll('[data-next]').forEach(btn=>{
  btn.addEventListener('click', ()=>{ if(current<scenes.length-1) goTo(current+1); });
});

/* onEnter: fire typewriter + animations per scene */
function onEnterScene(i){
  animLines(scenes[i]);
  if(i===0){ typewrite('tw0'); }
  if(i===1){
    const greet = document.getElementById('heroGreeting');
    const sub   = document.getElementById('heroSub');
    if(greet){ greet.textContent='Hari ini hari yang spesiall soalnyaa..'; greet.classList.remove('visible'); setTimeout(()=>greet.classList.add('visible'),100); }
    if(sub){ makeWaveText(sub,'ulang tahuunn'); sub.classList.remove('visible'); setTimeout(()=>sub.classList.add('visible'),400); }
  }
  if(i===2){ typewrite('tw2'); initWishes(); }
  if(i===3){ typewrite('tw3'); initBlow(); }
  if(i===4){ typewrite('tw4'); }
  if(i===5){ typewrite('tw5'); }
  if(i===6){ typewrite('tw6'); setTimeout(()=>burstConfetti(innerWidth/2, innerHeight/2, 230),300); }
}

/* ── REPLAY ── */
document.getElementById('replayBtn').addEventListener('click', ()=>{
  stopPlay();
  wishesInited = false;
  blowInited   = false;
  candlesOutCount = 0;
  document.querySelectorAll('.candle').forEach(c=>{ c.classList.remove('out'); });
  unlocked = 0;
  document.getElementById('giftWrap').classList.remove('opened');
  document.querySelectorAll('.next-wrap .btn').forEach(b=>b.classList.remove('show'));
  ['#scene1 .next-wrap .btn','#scene2 .next-wrap .btn','#scene5 .next-wrap .btn'].forEach(s=>{
    document.querySelector(s)?.classList.add('show');
  });
  document.getElementById('wishStage').innerHTML='';
  document.getElementById('wishDots').innerHTML='';
  wishIndex=0;
  goTo(0);
});

// boot
document.getElementById(scenes[0]).classList.add('active');
renderDots();
onEnterScene(0);

/* ═══════════════════════════════════════════════
   BACKGROUND DECORATIONS
═══════════════════════════════════════════════ */
const bgCanvas = document.getElementById('bgCanvas');
const starEmojis = ['✨','⭐','🌟','💫','🎀','🎊','🌈'];
function spawnStar(){
  const s = document.createElement('div');
  s.className = 'star';
  s.textContent = starEmojis[Math.floor(Math.random()*starEmojis.length)];
  s.style.left = (Math.random()*94)+'%';
  s.style.top  = (86+Math.random()*14)+'%';
  const dur = 9+Math.random()*10;
  s.style.animationDuration = dur+'s';
  s.style.animationDelay   = (Math.random()*2)+'s';
  s.style.fontSize = (11+Math.random()*13)+'px';
  bgCanvas.appendChild(s);
  setTimeout(()=>s.remove(), (dur+2)*1000);
}
setInterval(spawnStar, 1100);
for(let i=0;i<7;i++) setTimeout(spawnStar, i*500);

function spawnShimmer(){
  const s = document.createElement('div');
  s.className='shimmer-line';
  s.style.left=(Math.random()*80)+'%';
  s.style.top=(Math.random()*90)+'%';
  s.style.transform='rotate('+(Math.random()*30-15)+'deg)';
  s.style.animationDuration=(3+Math.random()*3)+'s';
  bgCanvas.appendChild(s);
  setTimeout(()=>s.remove(),7000);
}
setInterval(spawnShimmer,1800);

/* ═══════════════════════════════════════════════
   CONFETTI
═══════════════════════════════════════════════ */
const canvas = document.getElementById('confetti-canvas');
const ctx = canvas.getContext('2d');
function resizeCanvas(){ canvas.width=innerWidth; canvas.height=innerHeight; }
resizeCanvas(); window.addEventListener('resize', resizeCanvas);
let particles=[];
const confColors=['#FF4D8D','#FFC93C','#19C3B0','#7B3FE4','#FF7A3D','#fff','#ff85b3'];
function burstConfetti(x,y,count=120){
  for(let n=0;n<count;n++){
    const angle=Math.random()*Math.PI*2, speed=5+Math.random()*10;
    particles.push({
      x,y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed-5,
      size:4+Math.random()*7,color:confColors[Math.floor(Math.random()*confColors.length)],
      rot:Math.random()*360,vrot:(Math.random()-.5)*18,
      life:0,maxLife:80+Math.random()*55,shape:Math.random()>.5?'rect':'circle'
    });
  }
}
function animateConfetti(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach(p=>{
    p.vy+=0.22; p.vx*=0.995; p.x+=p.vx; p.y+=p.vy; p.rot+=p.vrot; p.life++;
    const alpha=Math.max(0,1-p.life/p.maxLife);
    ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot*Math.PI/180);
    ctx.globalAlpha=alpha; ctx.fillStyle=p.color;
    if(p.shape==='circle'){ctx.beginPath();ctx.arc(0,0,p.size/2,0,Math.PI*2);ctx.fill();}
    else{ctx.fillRect(-p.size/2,-p.size/4,p.size,p.size/2);}
    ctx.restore();
  });
  particles=particles.filter(p=>p.life<p.maxLife&&p.y<canvas.height+80);
  requestAnimationFrame(animateConfetti);
}
animateConfetti();

/* ═══════════════════════════════════════════════
   SCENE 0 — GIFT
═══════════════════════════════════════════════ */
const giftWrap = document.getElementById('giftWrap');
function openGift(){
  if(giftWrap.classList.contains('opened')) return;
  giftWrap.classList.add('opened');
  const r=giftWrap.getBoundingClientRect();
  burstConfetti(r.left+r.width/2, r.top+r.height/4, 100);
  setTimeout(unlockNext, 600);
}
giftWrap.addEventListener('click', openGift);
giftWrap.addEventListener('keydown', e=>{ if(e.key==='Enter'||e.key===' ') openGift(); });

/* ═══════════════════════════════════════════════
   SCENE 2 — WISHES
═══════════════════════════════════════════════ */
const wishes=[
  "Semoga tahun tahun kedepan dipenuhi tawa, kejutan manis, dan mimpi-mimpi yang terwujud.",
  "Terima kasih sudah jadi alasan banyak orang tersenyum, termasuk aku. ",
  "Semakin hari kita pasti akan berubah dan tumbuh, tapi semoga kamu tetap selalu di jalan Tuhan yaa.",
  "Selamat menambah satu tahun cerita baru. Selamat ulang tahunn"
];
let wishIndex=0, wishesInited=false;
function initWishes(){
  if(wishesInited) return; wishesInited=true;
  const stage=document.getElementById('wishStage');
  const dotsWrap=document.getElementById('wishDots');
  stage.innerHTML=''; dotsWrap.innerHTML='';
  wishes.forEach((w,i)=>{
    const d=document.createElement('div');
    d.className='wish-card'+(i===0?' active':'');
    const q=document.createElement('div'); q.className='wish-quote'; q.textContent='"';
    d.appendChild(q); d.appendChild(document.createTextNode(w));
    stage.appendChild(d);
    const dot=document.createElement('span'); if(i===0)dot.classList.add('on');
    dotsWrap.appendChild(dot);
  });
  const pB=document.getElementById('wishPrev'), nB=document.getElementById('wishNext');
  const np=pB.cloneNode(true), nn=nB.cloneNode(true);
  pB.replaceWith(np); nB.replaceWith(nn);
  np.addEventListener('click',()=>changeWish(-1));
  nn.addEventListener('click',()=>changeWish(1));
}
function changeWish(dir){
  const cards=document.querySelectorAll('.wish-card'), dots=document.querySelectorAll('.wish-dots span');
  const newIdx=Math.max(0,Math.min(wishes.length-1,wishIndex+dir));
  if(newIdx===wishIndex)return;
  cards[wishIndex].classList.remove('active'); cards[wishIndex].classList.add(dir>0?'leave-l':'leave-r');
  dots[wishIndex].classList.remove('on'); wishIndex=newIdx;
  setTimeout(()=>{
    cards.forEach(c=>c.classList.remove('leave-l','leave-r'));
    cards[wishIndex].classList.add('active'); dots[wishIndex].classList.add('on');
  },60);
}

/* ═══════════════════════════════════════════════
   SCENE 3 — CAKE + BLOW BUTTON
   The mic approach is replaced by a hold-to-blow button.
   Holding it fills a progress bar; on threshold each candle blows out.
═══════════════════════════════════════════════ */
let candlesOutCount = 0;
let blowInited = false;
let blowInterval = null;
let blowPower = 0;         // 0-100
let blowHolding = false;
const candleEls = document.querySelectorAll('.candle');

candleEls.forEach(c=>c.addEventListener('click', ()=>extinguish(c)));

function extinguish(c){
  if(c.classList.contains('out')) return;
  c.classList.add('out');
  candlesOutCount++;
  const r=c.getBoundingClientRect();
  burstConfetti(r.left+r.width/2, r.top, 35);
  spawnWindParticles(r.left+r.width/2, r.top+20);
  if(candlesOutCount===candleEls.length){
    document.getElementById('blowHint').textContent='Horeee! 🎂 Semoga semua permintaanmu terkabul!';
    const cR=document.getElementById('cakeZone').getBoundingClientRect();
    burstConfetti(cR.left+cR.width/2, cR.top+30, 170);
    unlockNext();
  }
}

function spawnWindParticles(x, y){
  const emojis=['💨','🌬️','✨','⭐'];
  for(let i=0;i<4;i++){
    const p=document.createElement('div'); p.className='wind-particle';
    p.textContent=emojis[Math.floor(Math.random()*emojis.length)];
    p.style.left=(x-20+Math.random()*40)+'px';
    p.style.top=(y+Math.random()*20)+'px';
    p.style.animationDelay=(i*0.08)+'s';
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),900);
  }
}

function initBlow(){
  if(blowInited) return; blowInited=true;
  const btn=document.getElementById('blowBtn');
  const bar=document.getElementById('micBar');
  const hint=document.getElementById('blowHint');

  function startBlow(e){
    e.preventDefault();
    if(candlesOutCount>=candleEls.length) return;
    blowHolding=true;
    btn.classList.add('blowing');
    // ripple effect
    const rect=btn.getBoundingClientRect();
    const cx=(e.clientX||rect.left+rect.width/2)-rect.left;
    const cy=(e.clientY||rect.top+rect.height/2)-rect.top;
    const rip=document.createElement('span'); rip.className='blow-ripple';
    rip.style.left=cx+'px'; rip.style.top=cy+'px';
    btn.appendChild(rip); setTimeout(()=>rip.remove(),700);

    clearInterval(blowInterval);
    blowInterval=setInterval(()=>{
      if(!blowHolding){ clearInterval(blowInterval); return; }
      blowPower=Math.min(100, blowPower+8);
      bar.style.width=blowPower+'%';
      hint.textContent=' '.repeat(Math.ceil(blowPower/34))+'sedang meniup…';
      if(blowPower>=100){
        blowPower=0; bar.style.width='0%';
        const lit=[...candleEls].find(c=>!c.classList.contains('out'));
        if(lit) extinguish(lit);
        if(candlesOutCount<candleEls.length) hint.textContent='Tiup lagi! Masih ada '+( candleEls.length-candlesOutCount )+' lilin lagi.';
      }
    }, 60);
  }

  function stopBlow(){
    blowHolding=false; btn.classList.remove('blowing');
    clearInterval(blowInterval);
    // drain bar
    const drain=setInterval(()=>{
      blowPower=Math.max(0,blowPower-6);
      bar.style.width=blowPower+'%';
      if(blowPower<=0) clearInterval(drain);
    },40);
    if(candlesOutCount<candleEls.length)
      document.getElementById('blowHint').textContent='';
  }

  btn.addEventListener('mousedown', startBlow);
  btn.addEventListener('touchstart', startBlow, {passive:false});
  btn.addEventListener('mouseup', stopBlow);
  btn.addEventListener('mouseleave', stopBlow);
  btn.addEventListener('touchend', stopBlow);
  btn.addEventListener('touchcancel', stopBlow);
}

/* ═══════════════════════════════════════════════
   SCENE 4 — VINYL
═══════════════════════════════════════════════ */
let audioCtx2=null;
let isPlaying=false;
let melodyTimer=null;
let customAudio = new Audio('assets/song1.mp3');
customAudio.loop = true;
let muted=false;
const vinylEl=document.getElementById('vinyl');
const tonearmEl=document.getElementById('tonearm');
const eqEl=document.getElementById('eq');
const playBtn=document.getElementById('playBtn');

// "Happy Birthday" inspired melody
const melody=[
  [392,.3],[392,.3],[440,.6],[392,.6],[523.25,.6],[493.88,1.2],
  [392,.3],[392,.3],[440,.6],[392,.6],[587.33,.6],[523.25,1.2],
  [392,.3],[392,.3],[784,.6],[659.26,.6],[523.25,.6],[493.88,.6],[440,1.2],
  [698.46,.3],[698.46,.3],[659.26,.6],[523.25,.6],[587.33,.6],[523.25,1.5]
];

function playSynthMelody(){
  if(!audioCtx2) audioCtx2=new (window.AudioContext||window.webkitAudioContext)();
  let t=audioCtx2.currentTime+0.05;
  melody.forEach(([freq,dur])=>{
    if(freq>0 && !muted){
      const osc=audioCtx2.createOscillator();
      const gain=audioCtx2.createGain();
      osc.type='triangle';
      osc.frequency.value=freq;
      gain.gain.setValueAtTime(0.0001,t);
      gain.gain.exponentialRampToValueAtTime(0.15,t+0.05);
      gain.gain.exponentialRampToValueAtTime(0.0001,t+dur*.9);
      osc.connect(gain).connect(audioCtx2.destination);
      osc.start(t); osc.stop(t+dur);
    }
    t+=dur;
  });
  const totalDur=melody.reduce((a,[,d])=>a+d,0)*1000;
  melodyTimer=setTimeout(()=>{ if(isPlaying && !customAudio) playSynthMelody(); },totalDur);
}

function startPlay(){
  isPlaying = true;

  vinylEl.classList.add('playing');
  tonearmEl.classList.add('down');
  eqEl.classList.remove('paused');
  playBtn.textContent = '⏸ Pause';

  customAudio.play();

  unlockNext();
}
function stopPlay(){
  isPlaying=false; vinylEl.classList.remove('playing'); tonearmEl.classList.remove('down');
  eqEl.classList.add('paused'); playBtn.textContent='▶ Putar';
  clearTimeout(melodyTimer); if(customAudio) customAudio.pause();
}
playBtn.addEventListener('click', ()=>isPlaying?stopPlay():startPlay());

document.getElementById('mute-btn').addEventListener('click', e=>{
  muted=!muted; e.target.textContent=muted?'🔇':'🔊';
  if(customAudio) customAudio.muted=muted;
});

/* ═══════════════════════════════════════════════
   SCENE 5 — BALLOONS
═══════════════════════════════════════════════ */
const wishTextEl=document.getElementById('wishText');
const balloonSky=document.getElementById('balloonSky');
const bgColors=['#FFEFD9','#E9F9F6','#F1E7FF','#FFE3EC','#FFFBE6'];
document.getElementById('releaseBtn').addEventListener('click', releaseWish);
wishTextEl.addEventListener('keydown', e=>{ if(e.key==='Enter') releaseWish(); });
function releaseWish(){
  const val=wishTextEl.value.trim(); if(!val) return;
  const b=document.createElement('div'); b.className='balloon-float';
  b.textContent='🎈 '+val;
  b.style.left=(8+Math.random()*68)+'%';
  b.style.background=bgColors[Math.floor(Math.random()*bgColors.length)];
  b.style.animationDuration=(5.5+Math.random()*2)+'s';
  balloonSky.appendChild(b);
  setTimeout(()=>b.remove(),8000);
  wishTextEl.value=''; wishTextEl.focus();
  const r=wishTextEl.getBoundingClientRect();
  burstConfetti(r.left+80, r.top, 22);
}
</script>
</body>
